<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>InfinityByte Admin</title>
    <link rel="stylesheet" href="css/style.css">
    <link rel="stylesheet" href="css/admin.css">
</head>
<body>
    <main class="admin-wrap">
        <section class="admin-card" id="loginCard">
            <h1>Project Admin</h1>
            <p>Sign in with your Firebase admin email and password.</p>
            <form id="loginForm" onsubmit="return false;">
                <label for="adminEmail">Email</label>
                <input id="adminEmail" type="email" required autocomplete="email">

                <label for="adminPassword">Password</label>
                <input id="adminPassword" type="password" required autocomplete="current-password">

                <button type="submit">Sign In</button>
            </form>
            <p id="authMessage" class="message"></p>
        </section>

        <section class="admin-card hidden" id="projectCard">
            <h2>Add a Project</h2>
            <p id="signedInText" class="message"></p>
            <form id="projectForm" class="project-form" onsubmit="return false;">
                <label for="title">Project Title</label>
                <input id="title" type="text" required>

                <label for="description">Description</label>
                <textarea id="description" required></textarea>

                <label for="url">Project URL</label>
                <input id="url" type="url" required>

                <label for="imageUrl">Image URL or Relative Path</label>
                <input id="imageUrl" type="text" placeholder="Assests/Project Logos/example.png" required>

                <label for="badge">Badge</label>
                <input id="badge" type="text" placeholder="Game Project">

                <label for="ctaText">Button Text</label>
                <input id="ctaText" type="text" placeholder="Visit Site">

                <button type="submit">Save Project</button>
            </form>
            <button id="logoutButton" type="button">Log Out</button>
            <p id="projectMessage" class="message"></p>
            <a class="back-link" href="index.html">Back to Portfolio</a>
        </section>
    </main>

    <script>
        // Fallback guard: keep forms from full-page reload if module script fails.
        window.addEventListener("DOMContentLoaded", () => {
            const loginForm = document.getElementById("loginForm");
            const projectForm = document.getElementById("projectForm");

            if (loginForm) {
                loginForm.addEventListener("submit", (event) => event.preventDefault());
            }

            if (projectForm) {
                projectForm.addEventListener("submit", (event) => event.preventDefault());
            }
        });

        window.addEventListener("error", (event) => {
            const authMessage = document.getElementById("authMessage");
            if (authMessage) {
                authMessage.textContent = "Script error: " + (event.message || "Unknown error");
            }
        });
    </script>

    <script type="module">
        import { addProject } from "./js/projects-service.js";
        import { getApp } from "./js/firebase-config.js";
        import {
            getAuth,
            onAuthStateChanged,
            signInWithEmailAndPassword,
            signOut
        } from "https://www.gstatic.com/firebasejs/10.13.2/firebase-auth.js";

        const loginCard = document.getElementById("loginCard");
        const projectCard = document.getElementById("projectCard");
        const loginForm = document.getElementById("loginForm");
        const authMessage = document.getElementById("authMessage");
        const signedInText = document.getElementById("signedInText");
        const logoutButton = document.getElementById("logoutButton");
        const projectForm = document.getElementById("projectForm");
        const projectMessage = document.getElementById("projectMessage");

        let auth;

        function setAdminVisible(isVisible) {
            if (isVisible) {
                loginCard.classList.add("hidden");
                projectCard.classList.remove("hidden");
            } else {
                loginCard.classList.remove("hidden");
                projectCard.classList.add("hidden");
            }
        }

        loginForm.addEventListener("submit", async (event) => {
            event.preventDefault();
            authMessage.textContent = "Signing in...";

            const email = document.getElementById("adminEmail").value.trim();
            const password = document.getElementById("adminPassword").value;

            try {
                await signInWithEmailAndPassword(auth, email, password);
                authMessage.textContent = "";
            } catch (error) {
                authMessage.textContent = "Sign in failed. Check email/password and try again.";
            }
        });

        logoutButton.addEventListener("click", async () => {
            try {
                await signOut(auth);
            } catch (error) {
                projectMessage.textContent = "Could not log out right now.";
            }
        });

        projectForm.addEventListener("submit", async (event) => {
            event.preventDefault();

            if (!auth.currentUser) {
                projectMessage.textContent = "Sign in is required before saving.";
                return;
            }

            projectMessage.textContent = "Saving project...";

            const data = {
                title: document.getElementById("title").value,
                description: document.getElementById("description").value,
                url: document.getElementById("url").value,
                imageUrl: document.getElementById("imageUrl").value,
                badge: document.getElementById("badge").value,
                ctaText: document.getElementById("ctaText").value
            };

            try {
                await addProject(data);
                projectMessage.textContent = "Project saved. It will appear on your homepage after refresh.";
                projectForm.reset();
            } catch (error) {
                projectMessage.textContent = "Could not save project. Check Firebase rules and try again.";
            }
        });

        async function initAuth() {
            const app = await getApp();
            auth = getAuth(app);

            onAuthStateChanged(auth, (user) => {
                if (user) {
                    signedInText.textContent = "Signed in as " + user.email;
                    setAdminVisible(true);
                } else {
                    signedInText.textContent = "";
                    projectMessage.textContent = "";
                    setAdminVisible(false);
                }
            });
        }

        initAuth().catch((error) => {
            authMessage.textContent = "Auth init error: " + (error.message || "Unknown error");
        });
    </script>
</body>
</html>
